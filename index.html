<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Nearby Behr Colors</title>
  <style>
    :root {
      --bg: #f7f3ee;
      --surface: #ffffff;
      --text: #1f1f1f;
      --muted: #6c6c6c;
      --line: #ddd6cc;
      --accent: #1e66d0;
      --shadow: 0 10px 28px rgba(62, 39, 21, 0.10);
      --radius-xl: 24px;
      --radius-lg: 18px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(#f8f6f1, #f7f3ee 35%, #f5f1eb);
      color: var(--text);
    }
    .app {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 18px 16px 40px;
    }
    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 0 18px;
    }
    .back {
      border: 0;
      background: transparent;
      font-size: 34px;
      line-height: 1;
      color: #1d5fbf;
      cursor: pointer;
      padding: 0;
    }
    .title {
      font-size: 20px;
      font-weight: 800;
      color: #1d5fbf;
      margin: 0;
    }
    .subtitle {
      font-size: 13px;
      color: var(--muted);
      margin: 2px 0 0;
    }
    .hero {
      background: var(--surface);
      border-radius: 26px;
      box-shadow: var(--shadow);
      padding: 16px;
      display: grid;
      grid-template-columns: 132px 1fr;
      gap: 16px;
      align-items: center;
      margin: 10px 0 28px;
    }
    .hero-swatch {
      width: 132px;
      height: 132px;
      border-radius: 20px;
      background: #9a7b5d;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.7);
    }
    .hero-name {
      font-size: 22px;
      line-height: 1.1;
      font-weight: 800;
      margin: 0 0 8px;
    }
    .hero-code {
      font-size: 16px;
      color: var(--muted);
      margin: 0 0 12px;
    }
    .badge {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: #eef4ff;
      color: #2965c2;
      font-weight: 700;
      font-size: 14px;
    }
    .section-label {
      font-size: 14px;
      letter-spacing: 0.18em;
      font-weight: 800;
      color: #6a6a6a;
      margin: 0 0 10px;
    }
    .section-copy {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.35;
    }
    .nearby-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }
    .nearby-card {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: var(--surface);
      box-shadow: 0 3px 10px rgba(0,0,0,0.06);
      padding: 0;
      text-align: left;
      cursor: pointer;
    }
    .nearby-swatch {
      height: 110px;
      width: 100%;
      background: #9a7b5d;
    }
    .nearby-meta {
      padding: 10px 10px 12px;
      min-height: 86px;
    }
    .nearby-name {
      font-size: 12px;
      line-height: 1.1;
      font-weight: 800;
      color: #202020;
      word-break: break-word;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: 40px;
    }
    .nearby-code, .nearby-delta {
      margin-top: 4px;
      font-size: 11px;
      color: #696969;
      line-height: 1.15;
    }
    .row-label {
      grid-column: 1 / -1;
      font-size: 12px;
      font-weight: 700;
      color: #7a746c;
      margin: 2px 0 -2px;
    }
    @media (max-width: 390px) {
      .app { padding-inline: 12px; }
      .nearby-grid { gap: 8px; }
      .nearby-swatch { height: 102px; }
      .nearby-meta { padding: 9px 8px 10px; }
      .nearby-name { font-size: 11px; }
      .nearby-code, .nearby-delta { font-size: 10.5px; }
      .hero { grid-template-columns: 122px 1fr; }
      .hero-swatch { width: 122px; height: 122px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="topbar">
      <button class="back" aria-label="Go back">&#x2039;</button>
      <div>
        <h1 class="title">Nearby Behr Colors</h1>
        <p class="subtitle">Colors closest to your selected Behr paint</p>
      </div>
    </div>

    <section class="hero" id="selectedCard">
      <div class="hero-swatch" id="heroSwatch"></div>
      <div>
        <h2 class="hero-name" id="heroName">Selected Color</h2>
        <p class="hero-code" id="heroCode">Code</p>
        <span class="badge">Behr</span>
      </div>
    </section>

    <section>
      <h2 class="section-label">AROUND YOUR SELECTED COLOR</h2>
      <p class="section-copy">Top row shows the 3 colors before it in the palette. Bottom row shows the 3 colors after it.</p>
      <div id="nearbyColors" class="nearby-grid"></div>
    </section>
  </main>

  <script>
    const PALETTE_FILE = './behr-colors.json';

    function getSelectedCode() {
      const params = new URLSearchParams(window.location.search);
      return params.get('code') || params.get('label') || params.get('selected') || 'S220-6';
    }

    function escapeHtml(str) {
      return String(str ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function normalizeColor(raw) {
      return {
        name: raw.name || raw.color || raw.title || 'Unnamed Color',
        code: raw.code || raw.label || raw.id || '',
        label: raw.label || raw.code || raw.id || '',
        hex: raw.hex || raw.value || '#cccccc',
        deltaE: raw.deltaE ?? raw.delta ?? null
      };
    }

    function formatDelta(value) {
      if (value == null || Number.isNaN(Number(value))) return '';
      return `ΔE00 ${Number(value).toFixed(2)}`;
    }

    function getPaletteNeighbors(allColors, selectedCode) {
      const selectedIndex = allColors.findIndex(c => c.code === selectedCode || c.label === selectedCode);
      if (selectedIndex === -1) return { before: [], after: [], selected: allColors[0] || null };
      return {
        before: allColors.slice(Math.max(0, selectedIndex - 3), selectedIndex),
        after: allColors.slice(selectedIndex + 1, selectedIndex + 4),
        selected: allColors[selectedIndex]
      };
    }

    function renderSelected(color) {
      document.getElementById('heroSwatch').style.background = color.hex;
      document.getElementById('heroName').textContent = color.name;
      document.getElementById('heroCode').textContent = color.code || color.label || '';
    }

    function renderNearby(before, after) {
      const wrap = document.getElementById('nearbyColors');
      const beforeHtml = before.map(color => `
        <button class="nearby-card" type="button" onclick="openNearbyColor('${escapeHtml(color.code || color.label)}')">
          <div class="nearby-swatch" style="background:${escapeHtml(color.hex)}"></div>
          <div class="nearby-meta">
            <div class="nearby-name">${escapeHtml(color.name)}</div>
            <div class="nearby-code">${escapeHtml(color.code || color.label)}</div>
            <div class="nearby-delta">${formatDelta(color.deltaE)}</div>
          </div>
        </button>
      `).join('');
      const afterHtml = after.map(color => `
        <button class="nearby-card" type="button" onclick="openNearbyColor('${escapeHtml(color.code || color.label)}')">
          <div class="nearby-swatch" style="background:${escapeHtml(color.hex)}"></div>
          <div class="nearby-meta">
            <div class="nearby-name">${escapeHtml(color.name)}</div>
            <div class="nearby-code">${escapeHtml(color.code || color.label)}</div>
            <div class="nearby-delta">${formatDelta(color.deltaE)}</div>
          </div>
        </button>
      `).join('');

      wrap.innerHTML = `
        <div class="row-label">Before selected color</div>
        ${beforeHtml}
        <div class="row-label">After selected color</div>
        ${afterHtml}
      `;
    }

    function openNearbyColor(code) {
      const params = new URLSearchParams(window.location.search);
      params.set('code', code);
      window.location.search = params.toString();
    }

    async function init() {
      try {
        const response = await fetch(PALETTE_FILE);
        const raw = await response.json();
        const allColors = raw.map(normalizeColor);
        const selectedCode = getSelectedCode();
        const { before, after, selected } = getPaletteNeighbors(allColors, selectedCode);
        if (!selected) throw new Error('No colors found in palette file.');
        renderSelected(selected);
        renderNearby(before, after);
      } catch (error) {
        document.getElementById('nearbyColors').innerHTML = '<p class="section-copy">Unable to load the Behr palette file. Keep this HTML in the same folder as behr-colors.json.</p>';
      }
    }

    init();
  </script>
</body>
</html>
